name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `native-patches init --clean`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Paste any error output here.
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Is there a workaround for this issue?
    validations:
      required: false

  - type: textarea
    id: root_cause
    attributes:
      label: Root cause
      description: If you know why this happens, describe it here.
    validations:
      required: false

  - type: textarea
    id: possible_fix
    attributes:
      label: Possible fix
      description: If you have ideas on how to fix this, describe them here.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0-beta.1"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.12.0"
    validations:
      required: true

  - type: input
    id: expo
    attributes:
      label: Expo SDK version
      placeholder: "52"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
